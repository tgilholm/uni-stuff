<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>V&A Search</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="">

    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="index.js"></script>
</head>

<body>
    <h1>V&A Museum</h1>

    <!-- Accept input from the user -->
    <form class="search-container">
        <input id="textInput" type="text" placeholder="Search the V&A">
        <input id="searchButton" type="button" value="Search">
    </form>

    <!-- All output nodes are appended to the result -->
    <div id="result"></div>


    <!-- Reusable template for records -->
    <template id="record-template">
        <div class="row">
            <img class="image">
            <div class="text-container">
                <h3 class="title"></h3>
                <p class="maker"></p>
                <p class="date"></p>
            </div>
        </div>
    </template>
</body>
</html>
